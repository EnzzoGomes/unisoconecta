<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="conecta.uniso - Conectando Jovens ao Futuro. Plataforma de aprendizado profissional com cursos de tecnologia">
    <title>conecta.uniso - Conectando Jovens ao Futuro</title>
    <link rel="icon" href="./logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        /* === CONFIGURAÇÕES GERAIS === */
        :root {
            --bg: #050505;
            --card-bg: #111;
            --primary: #7c3aed;
            --primary-glow: rgba(124, 58, 237, 0.5);
            --white: #ffffff;
            --gray: #a3a3a3;
            --text-muted: #666;
            --roxo-escuro: #050505;
            --roxo-primario: #7c3aed;
            --roxo-medio: #1a1a1a;
            --roxo-claro: #9d3fff;
            --roxo-muito-claro: #222222;
            --branco: #FFFFFF;
            --cinza-escuro: #f5f5f5;
            --cinza-medio: #a3a3a3;
            --cinza-border: #333333;
            --verde: #10B981;
            --vermelho: #EF4444;
            --amarelo: #F59E0B;
            --text-xs: 0.75rem;
            --text-sm: 0.8125rem;
            --text-base: 0.875rem;
            --text-md: 1rem;
            --text-lg: 1.125rem;
            --text-xl: 1.25rem;
            --text-2xl: 1.5rem;
            --text-3xl: 1.75rem;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-size: var(--text-base);
        }

        body {
            background-color: var(--roxo-escuro);
            color: var(--cinza-escuro);
            line-height: 1.6;
            font-size: var(--text-base);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        button {
            cursor: pointer;
            border: none;
            outline: none;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        input,
        textarea,
        select {
            border: 1px solid var(--cinza-border);
            padding: 11px 14px;
            border-radius: 8px;
            width: 100%;
            font-size: var(--text-base);
            font-family: inherit;
            background: #111;
            color: #eee;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus,
        textarea:focus,
        select:focus {
            border-color: var(--roxo-primario);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.15);
            outline: none;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .flex {
            display: flex;
        }

        .grid {
            display: grid;
        }

        .justify-between {
            justify-content: space-between;
        }

        .items-center {
            align-items: center;
        }

        .text-center {
            text-align: center;
        }

        .mt-1 {
            margin-top: 0.25rem;
        }

        .mt-2 {
            margin-top: 0.5rem;
        }

        .mt-3 {
            margin-top: 0.75rem;
        }

        .mt-4 {
            margin-top: 1rem;
        }

        .mb-1 {
            margin-bottom: 0.25rem;
        }

        .mb-2 {
            margin-bottom: 0.5rem;
        }

        .mb-3 {
            margin-bottom: 0.75rem;
        }

        .mb-4 {
            margin-bottom: 1rem;
        }

        .ml-3 {
            margin-left: 0.75rem;
        }

        .p-2 {
            padding: 0.5rem;
        }

        .p-3 {
            padding: 0.75rem;
        }

        .p-4 {
            padding: 1rem;
        }

        .btn {
            padding: 18px 40px;
            border-radius: 12px;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-block;
            cursor: pointer;
            font-size: 1rem;
            border: none;
            text-align: center;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 0 25px var(--primary-glow);
        }

        .btn-primary:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 40px var(--primary);
        }

        .btn-secondary {
            background: transparent;
            border: 2px solid #333;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
        }

        .btn-secondary:hover {
            border-color: var(--primary);
            background: rgba(124, 58, 237, 0.1);
        }

        .btn-danger {
            background-color: var(--vermelho);
            color: white;
            padding: 10px 20px;
            border-radius: 4px;
        }

        .btn-success {
            background-color: var(--verde);
            color: white;
            padding: 10px 20px;
            border-radius: 4px;
        }

        .full-width {
            width: 100%;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid #1a1a1a;
            border-radius: 20px;
            padding: 35px;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            border-color: var(--primary);
            transform: translateY(-10px);
            box-shadow: 0 20px 50px rgba(124, 58, 237, 0.2);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), transparent);
            opacity: 0;
            transition: 0.4s;
        }

        .card:hover::before {
            opacity: 1;
        }

        /* Netflix Style Cards */
        .netflix-card {
            position: relative;
            background: #141414;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1), box-shadow 0.4s;
            border: 1px solid #222;
        }

        .netflix-card:hover {
            transform: scale(1.05);
            z-index: 10;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.8);
            border-color: var(--roxo-primario);
        }

        .netflix-card .thumbnail {
            height: 180px;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .netflix-card .thumbnail::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60%;
            background: linear-gradient(to top, #141414, transparent);
        }

        .netflix-card .info {
            padding: 15px;
            position: relative;
        }

        .netflix-card h3 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .netflix-card .meta {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 11px;
            color: #2ecc71;
            font-weight: 700;
        }

        .netflix-card .meta span {
            color: var(--cinza-medio);
            font-weight: 400;
        }

        .hero-section {
            position: relative;
            height: 450px;
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            align-items: center;
            padding: 60px;
            margin-bottom: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to right, #000 30%, transparent 100%);
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 600px;
        }

        h1 {
            font-size: var(--text-3xl);
            font-weight: 800;
            letter-spacing: -0.03em;
            color: var(--branco);
            line-height: 1.2;
        }

        h2 {
            font-size: var(--text-2xl);
            font-weight: 700;
            letter-spacing: -0.025em;
            color: var(--branco);
            line-height: 1.25;
        }

        h3 {
            font-size: var(--text-xl);
            font-weight: 600;
            letter-spacing: -0.02em;
            color: var(--branco);
            line-height: 1.3;
        }

        h4 {
            font-size: var(--text-md);
            font-weight: 600;
            color: var(--branco);
            line-height: 1.4;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
        }

        .table th,
        .table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #222;
        }

        .table tr:hover {
            background-color: #111;
        }

        .table tr:nth-child(even) {
            background-color: #0d0d0d;
        }

        .table-responsive {
            overflow-x: auto;
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }

        .badge-success {
            background-color: #d1fae5;
            color: var(--verde);
        }

        .badge-warning {
            background-color: #fed7aa;
            color: var(--amarelo);
        }

        .progress-bar {
            height: 10px;
            background-color: #e0e0e0;
            border-radius: 5px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(to right, var(--roxo-medio), var(--roxo-claro));
            border-radius: 5px;
        }

        .progress-text {
            font-size: 12px;
            color: var(--cinza-medio);
            margin-top: 5px;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 4px;
            color: white;
            z-index: 1000;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.success {
            background-color: var(--verde);
        }

        .toast.error {
            background-color: var(--vermelho);
        }

        .toast.info {
            background-color: var(--amarelo);
        }

        /* === LOGIN PAGE === */
        #login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.8)), url('https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&q=80&w=2070') center/cover;
            position: relative;
        }

        #login-page::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at center, transparent 0%, #000 100%);
            z-index: 1;
        }

        .login-box {
            background: #0a041a;
            /* Dark background from logo */
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 20px rgba(124, 58, 237, 0.2);
            width: 100%;
            max-width: 420px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            animation: slideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            z-index: 10;
        }

        .login-logo {
            width: 160px;
            height: 160px;
            background: #000;
            border-radius: 50%;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 2px solid var(--roxo-primario);
            box-shadow: 0 0 30px rgba(124, 58, 237, 0.4);
        }

        .login-logo img {
            width: 120%;
            height: 120%;
            object-fit: cover;
        }

        .login-header h1 {
            color: #fff;
            font-size: var(--text-2xl);
            margin-bottom: 8px;
            font-weight: 800;
        }

        .login-header p {
            color: var(--roxo-claro);
            font-size: var(--text-base);
            margin-bottom: 30px;
            font-weight: 500;
        }

        .login-box label {
            color: #ccc;
            font-weight: 500;
        }

        .login-box input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .link-button {
            font-size: 14px;
            text-align: center;
            display: block;
            margin-top: 10px;
        }

        /* === MAIN LAYOUT === */
        #main-app {
            display: none;
        }

        /* --- Navbar Fixa --- */
        .header {
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #222;
            position: sticky;
            top: 0;
            background: rgba(5, 5, 5, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            padding: 0 40px;
            left: 0 !important;
            right: 0;
            width: 100%;
        }

        .logo {
            font-weight: 800;
            font-size: 1.6rem;
            color: var(--white);
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .logo span {
            color: var(--primary);
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .nav-link {
            color: var(--gray);
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
            font-size: 0.95rem;
            cursor: pointer;
        }

        .nav-link:hover,
        .nav-link.active {
            color: var(--primary);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 14px;
        }

        .logout-btn {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #ef4444;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: 0.3s;
        }

        .logout-btn:hover {
            background: #ef4444;
            color: white;
        }

        .sidebar {
            display: none !important;
        }

        .main-content {
            margin-left: 0 !important;
            padding: 40px 20px;
            min-height: calc(100vh - 80px);
        }

        .sidebar-toggle-btn {
            display: none !important;
        }

        /* === DASHBOARD ADMIN === */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #111;
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--cinza-border);
            display: flex;
            flex-direction: column;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
            border-color: var(--roxo-primario);
        }

        .stat-number {
            font-size: var(--text-2xl);
            font-weight: 800;
            color: #fff;
            margin-bottom: 8px;
        }

        .stat-label {
            color: var(--roxo-claro);
            font-size: var(--text-sm);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .chart-container {
            background: #111;
            border-radius: 12px;
            padding: 24px;
            border: 1px solid var(--cinza-border);
            margin-bottom: 30px;
        }

        .chart-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 25px;
            color: #fff;
        }

        .bar-chart {
            display: flex;
            align-items: end;
            height: 200px;
            gap: 10px;
            padding: 20px 0;
        }

        .bar {
            flex: 1;
            background: linear-gradient(to top, var(--roxo-medio), var(--roxo-claro));
            border-radius: 4px 4px 0 0;
            position: relative;
            min-width: 30px;
        }

        .bar-label {
            position: absolute;
            bottom: -25px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 12px;
        }

        .bar-value {
            position: absolute;
            top: -25px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 12px;
            font-weight: 500;
        }

        /* === FORM STYLES === */
        .form-section {
            background: #111;
            border-radius: 12px;
            padding: 30px;
            border: 1px solid var(--cinza-border);
            margin-bottom: 30px;
        }

        .form-section h3 {
            margin-bottom: 25px;
            color: #fff;
            font-weight: 700;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        /* === TABLE ACTIONS === */
        .table-actions {
            display: flex;
            gap: 5px;
        }

        .action-btn {
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
        }

        .edit-btn {
            background: var(--amarelo);
            color: white;
        }

        .delete-btn {
            background: var(--vermelho);
            color: white;
        }

        .view-btn {
            background: var(--roxo-medio);
            color: white;
        }

        /* === MODAL === */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            backdrop-filter: blur(8px);
        }

        .modal.show {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: #111;
            border-radius: 12px;
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid #333;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            color: #fff;
        }

        .modal-header {
            padding: 24px 30px;
            border-bottom: 1px solid #222;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--cinza-medio);
            transition: color 0.2s;
        }

        .close-modal:hover {
            color: #fff;
        }

        .badge-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .badge-item {
            text-align: center;
            font-size: 10px;
            color: var(--cinza-medio);
        }

        .badge-icon {
            font-size: 24px;
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            filter: grayscale(1);
            opacity: 0.3;
        }

        .badge-icon.unlocked {
            filter: grayscale(0);
            opacity: 1;
        }

        .xp-badge {
            background: #fef3c7;
            color: #92400e;
            padding: 4px 12px;
            border-radius: 99px;
            font-size: 12px;
            font-weight: 700;
        }

        .modal-footer {
            padding: 24px 30px;
            border-top: 1px solid #222;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        /* === COURSE CATALOG === */
        .catalog-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .search-box {
            position: relative;
            width: 300px;
        }

        .search-box input {
            padding-left: 40px;
        }

        .search-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--cinza-medio);
        }

        .filter-section {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .category-carousel {
            margin-bottom: 40px;
        }

        .carousel-title {
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 20px;
            color: var(--roxo-escuro);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .course-card {
            min-width: 280px;
            background: white;
            border-radius: 14px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            overflow: hidden;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            cursor: pointer;
            border: 1px solid var(--cinza-border);
        }

        .course-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.12);
        }

        .course-image {
            height: 150px;
            background: linear-gradient(135deg, var(--roxo-medio), var(--roxo-claro));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: var(--text-2xl);
            letter-spacing: 2px;
        }

        .course-info {
            padding: 20px;
        }

        .course-title {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 10px;
            color: var(--roxo-escuro);
        }

        .course-description {
            font-size: 14px;
            color: var(--cinza-medio);
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .course-meta {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--cinza-medio);
            margin-bottom: 15px;

                const users = Storage.get('users');
                const user = users.find(u => u.email === email && u.password === password);

                if (user) {
                    if (user.xp === undefined) user.xp = 0;
                    this.currentUser = user;
                    Storage.set('currentUser', user);
                    this.updateUI();
                    MainApp.showMainApp();
                    Toast.show('Login realizado com sucesso!', 'success');
                    return true;
                }

                Toast.show('Email ou senha incorretos', 'error');
                return false;

                const users = Storage.get('users');

                if (users.some(u => u.email === userData.email)) {
                    Toast.show('Este email já está cadastrado', 'error');
                    return false;
                }

                const newUser = {
                    id: 'user_' + Date.now(),
                    ...userData,

                    if (this.currentUser.role === 'student') {
                        document.getElementById('student-stats').style.display = 'flex';
                        document.getElementById('user-xp').textContent = this.currentUser.xp || 0;

            updateUserProgress: function (courseId, lessonId, completed) {
                if (!this.currentUser) return;

                const users = Storage.get('users');
                const userIndex = users.findIndex(u => u.id === this.currentUser.id);

                if (userIndex !== -1) {
                    if (!users[userIndex].completedLessons) {
                        users[userIndex].completedLessons = [];
                    }

                    if (completed && !users[userIndex].completedLessons.includes(lessonId)) {
                        users[userIndex].completedLessons.push(lessonId);
                        users[userIndex].xp = (users[userIndex].xp || 0) + 100;

                        users[userIndex].completedLessons = users[userIndex].completedLessons.filter(id => id !== lessonId);

                    // Recalculate progress for course
                    const courses = Storage.get('courses');
                    const course = courses.find(c => c.id === courseId);

                        let totalLessons = 0;
                        let completedLessons = 0;

                        course.modules.forEach(module => {
                            module.lessons.forEach(lesson => {
                                totalLessons++;
                                if (users[userIndex].completedLessons.includes(lesson.id)) {
                                    completedLessons++;
                                }
                            });
                        });

                        const progressPercent = totalLessons > 0 ? Math.round((completedLessons / totalLessons) * 100) : 0;
                        users[userIndex].progress = users[userIndex].progress || {};
                        users[userIndex].progress[courseId] = progressPercent;
                    }

                    Storage.set('users', users);
                    this.currentUser = users[userIndex];
                    Storage.set('currentUser', this.currentUser);
                    this.updateUI();
                }
            },

            enrollCourse: function (courseId) {
                if (!this.currentUser) return false;

                const users = Storage.get('users');
                const userIndex = users.findIndex(u => u.id === this.currentUser.id);

                if (userIndex !== -1) {
                    if (!users[userIndex].enrolledCourses) {
                        users[userIndex].enrolledCourses = [];
                    }

                    if (!users[userIndex].enrolledCourses.includes(courseId)) {
                        users[userIndex].enrolledCourses.push(courseId);
                        users[userIndex].progress = users[userIndex].progress || {};
                        users[userIndex].progress[courseId] = 0;

                        Storage.set('users', users);
                        this.currentUser = users[userIndex];
                        Storage.set('currentUser', this.currentUser);

                        Toast.show('Matrícula realizada com sucesso!', 'success');
                        return true;
                    } else {
                        Toast.show('Você já está matriculado neste curso', 'info');
                        return false;
                    }
                }
                return false;
            }

                    <div class="hero-section" style="background-image: url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&q=80&w=2070');">

                        <div class="hero-content">

                            <h1 style="font-size: 56px; margin: 20px 0; line-height: 1;">conecta.uniso</h1>
                            <p style="font-size: 18px; color: #ddd; margin-bottom: 30px;">Conectando Jovens ao Futuro através da tecnologia e aprendizado de alto nível.</p>
                            <div class="flex gap-4">
                                <button class="btn-primary" style="padding: 14px 40px; font-size: 18px; border-radius: 4px;">Começar Grátis</button>
                                <button class="btn-secondary" style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); padding: 14px 40px; font-size: 18px; color: white;">Saiba Mais</button>
                            </div>
                        </div>
                    </div>

                    <div class="catalog-header mb-8">
                        <h2 style="font-size: 26px;">Continuar Assistindo</h2>
                        <div class="search-box" style="background: #111; border: 1px solid #333;">

                        </div>
                    </div>
                    
                    <div id="courses-container">
                        ${this.renderCourses(courses, categories, currentUser)}
                    </div>
                `;

                document.getElementById('content-area').innerHTML = content;
            },

            renderCourses: function (courses, categories, currentUser) {
                let html = '';

                categories.forEach(category => {
                    const categoryCourses = courses.filter(course => course.category === category.id);
                    if (categoryCourses.length === 0) return;

                    html += `
                        <div class="mb-10">
                            <h3 style="font-size: 18px; margin-bottom: 20px; font-weight: 700; color: #ddd;">${category.name}</h3>
                            <div class="row">
                                ${categoryCourses.map(course => `
                                    <div class="col-md-3 col-sm-6 mb-6">
                                        <div class="netflix-card" onclick="CourseDetail.render('${course.id}')">
                                            <div class="thumbnail" style="background-image: url('${course.thumbnail || 'https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&q=80&w=2070'}');"></div>
                                            <div class="info">
                                                <h3>${course.title}</h3>
                                                <div class="meta">
                                                    <span>${course.modules.length} Módulos</span>
                                                    <span>98% Relevância</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                });

                return html;
            },

            filterCourses: function () {
                const searchTerm = document.getElementById('search-input')?.value.toLowerCase() || '';
                const courses = Storage.get('courses');
                const categories = Storage.get('categories');
                const currentUser = Auth.currentUser;

                const container = document.getElementById('courses-container');
                if (container) {
                    const filteredCourses = courses.filter(c => c.title.toLowerCase().includes(searchTerm));
                    container.innerHTML = this.renderCourses(filteredCourses, categories, currentUser) || '<div class="card text-center">Nenhum curso encontrado.</div>';
                }
            },

            enroll: function (courseId) {
                if (Auth.enrollCourse(courseId)) {
                    this.render();
                }
            }
        };

        // === MÓDULO DE DETALHES DO CURSO ===
        const CourseDetail = {
            render: function (courseId) {
                const courses = Storage.get('courses');
                const course = courses.find(c => c.id === courseId);

                if (!course) {
                    Toast.show('Curso não encontrado', 'error');
                    Router.navigate('catalog');
                    return;
                }

                const currentUser = Auth.currentUser;
                const isEnrolled = currentUser?.enrolledCourses?.includes(courseId);
                const completedLessons = currentUser?.completedLessons || [];

                const content = `
                    <button class="btn-secondary mb-4" onclick="Router.navigate('catalog')">← Voltar para Catálogo</button>
                    
                    <div class="course-banner" style="height: 300px; background: url('${course.thumbnail || 'https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&q=80&w=2070'}') center/cover; position: relative; border-radius: 12px; margin-bottom: 20px;">
                        <div style="position: absolute; inset: 0; background: linear-gradient(to top, #000, transparent); border-radius: 12px;"></div>
                        <div style="position: absolute; bottom: 30px; left: 30px;">
                            <h1 style="font-size: 48px; color: white;">${course.title}</h1>
                        </div>
                    </div>
                    
                    <div class="course-detail-header card mb-6" style="background: #181818; border: 1px solid #333;">
                        <div class="course-detail-info">
                            <div class="course-detail-meta mb-4">
                                <span class="badge" style="background: rgba(46, 204, 113, 0.2); color: #2ecc71;">${course.duration} horas</span>
                                <span class="badge" style="background: rgba(124, 58, 237, 0.2); color: var(--roxo-claro);">${course.level.toUpperCase()}</span>
                                <span class="badge" style="background: rgba(255, 255, 255, 0.1); color: #ddd;">${course.modules.length} Módulos</span>
                            </div>
                            <p style="color: #aaa; font-size: 16px; margin-bottom: 25px;">${course.description}</p>
                        </div>
                        ${!isEnrolled ? `
                            <button class="btn-primary" style="padding: 15px 40px; font-size: 18px;" onclick="CourseCatalog.enroll('${courseId}')">Matricular-se Agora</button>
                        ` : currentUser && currentUser.progress?.[courseId] === 100 ? `
                            <button class="btn-success" onclick="Certificate.render('${courseId}')">Ver Certificado</button>
                        ` : ''}
                    </div>
                    
                    <h3 class="mb-4">Conteúdo do Curso</h3>
                    
                    ${course.modules.map((module, moduleIndex) => `
                        <div class="module-accordion mb-3" style="background: #181818; border-radius: 8px; border: 1px solid #333; overflow: hidden;">
                            <div class="module-header" style="background: #222; padding: 15px 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center;" onclick="CourseDetail.toggleModule(${moduleIndex})">
                                <strong style="color: #eee;">${module.title}</strong>
                                <span style="font-size: 12px; color: var(--roxo-claro);">${this.getModuleProgress(module, completedLessons)}%</span>
                            </div>
                            <div class="module-content" id="module-${moduleIndex}" style="display: none; padding: 10px;">
                                <ul class="lesson-list">
                                    ${module.lessons.map(lesson => `
                                        <li class="lesson-item" style="padding: 12px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #222;" onclick="CourseDetail.openLesson('${courseId}', '${lesson.id}', '${lesson.type}')">
                                            <div class="lesson-icon" style="background: #333; color: white; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px;">
                                                ${lesson.type === 'video' ? '▶' : '?'}
                                            </div>
                                            <div class="lesson-info" style="flex: 1;">
                                                <div class="lesson-title" style="color: #eee; font-weight: 500;">${lesson.title}</div>
                                                <div class="lesson-meta" style="font-size: 12px; color: #888;">${lesson.duration} min • ${lesson.type === 'video' ? 'Aula gravada' : 'Avaliação'}</div>
                                            </div>
                                            <div class="lesson-status ${completedLessons.includes(lesson.id) ? 'completed' : ''}" 
                                                 style="width: 20px; height: 20px; border-radius: 50%; border: 2px solid #555; ${completedLessons.includes(lesson.id) ? 'background: #2ecc71; border-color: #2ecc71;' : ''}"
                                                 onclick="event.stopPropagation(); CourseDetail.toggleLessonComplete('${courseId}', '${lesson.id}', ${!completedLessons.includes(lesson.id)})">
                                            </div>
                                        </li>
                                    `).join('')}
                                </ul>
                            </div>
                        </div>
                    `).join('')}
                `;

                document.getElementById('content-area').innerHTML = content;

                if (course.modules.length > 0) {
                    this.toggleModule(0);
                }
            },

            getModuleProgress: function (module, completedLessons) {
                const totalLessons = module.lessons.length;
                const completed = module.lessons.filter(lesson => completedLessons.includes(lesson.id)).length;
                return Math.round((completed / totalLessons) * 100);
            },

            toggleModule: function (moduleIndex) {
                const content = document.getElementById(`module - ${moduleIndex} `);
                const header = content?.previousElementSibling;

                if (content) {
                    content.classList.toggle('open');
                    header?.classList.toggle('active');
                }
            },

            toggleLessonComplete: function (courseId, lessonId, completed) {
                Auth.updateUserProgress(courseId, lessonId, completed);
                this.render(courseId);
                Toast.show(completed ? 'Aula concluída!' : 'Progresso atualizado', 'success');
            },

            openLesson: function (courseId, lessonId, type) {
                if (type === 'quiz') {
                    this.openQuiz(courseId, lessonId);
                } else {
                    LessonPlayer.render(courseId, lessonId);
                }
            },

            openQuiz: function (courseId, lessonId) {
                const courses = Storage.get('courses');
                let lesson = null;
                let course = null;

                for (const c of courses) {
                    for (const module of c.modules) {
                        const found = module.lessons.find(l => l.id === lessonId);
                        if (found) {
                            lesson = found;
                            course = c;
                            break;
                        }
                    }
                    if (lesson) break;
                }

                if (!lesson || !lesson.quizQuestions) {
                    Toast.show('Quiz não disponível', 'error');
                    return;
                }

                Quiz.render(courseId, lessonId, lesson);
            }
        };

        // === MÓDULO DE PLAYER DE VÍDEO ===
        const LessonPlayer = {
            render: function (courseId, lessonId) {
                const courses = Storage.get('courses');
                const course = courses.find(c => c.id === courseId);
                let lesson = null;

                course.modules.forEach(m => {
                    const found = m.lessons.find(l => l.id === lessonId);
                    if (found) lesson = found;
                });

                const videoContent = lesson.videoId
                    ? `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${lesson.videoId}" frameborder="0" allowfullscreen></iframe>`
                    : `<div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: white; background: linear-gradient(45deg, #111, #1a1a1a);">
                        <div style="border: 2px solid white; padding: 20px; border-radius: 50%; width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; font-weight: bold;">▶</div>
                        <h2 class="mb-4">${lesson.title}</h2>
                        <p class="mb-4" style="font-size: 14px; opacity: 0.8;">Esta aula não possui um vídeo vinculado.</p>
                        <button class="btn-primary" onclick="LessonPlayer.complete('${courseId}', '${lessonId}')">Marcar como Concluída</button>
                       </div>`;

                const content = `
                    <div class="player-view">
                        <button class="btn-secondary mb-4" onclick="CourseDetail.render('${courseId}')">← Voltar ao Curso</button>
                        <div class="card p-0 overflow-hidden" style="background: #000; border: 1px solid #333;">
                            <div style="aspect-ratio: 16/9;">${videoContent}</div>
                        </div>
                        <div class="card mt-4" style="background: #181818; border: 1px solid #333;">
                            <h3>Sobre esta aula</h3>
                            <p class="mt-2" style="color: #aaa;">Nesta aula de ${lesson.duration} minutos, exploraremos os conceitos fundamentais de ${course.title}.</p>
                        </div>
                    </div>
                `;
                document.getElementById('content-area').innerHTML = content;
            },
            complete: function (courseId, lessonId) {
                Auth.updateUserProgress(courseId, lessonId, true);
                Toast.show('Aula concluída! +100 XP', 'success');
                CourseDetail.render(courseId);
            }
        };

        // === MÓDULO DE QUIZ ===
        const Quiz = {
            currentAnswers: [],
            currentQuestionIndex: 0,
            questions: [],
            courseId: null,
            lessonId: null,

            render: function (courseId, lessonId, lesson) {
                this.courseId = courseId;
                this.lessonId = lessonId;
                this.questions = lesson.quizQuestions || [];
                this.currentAnswers = new Array(this.questions.length).fill(null);
                this.currentQuestionIndex = 0;

                this.showQuestion();
            },

            showQuestion: function () {
                if (this.currentQuestionIndex >= this.questions.length) {
                    this.showResults();
                    return;
                }

                const question = this.questions[this.currentQuestionIndex];
                const currentAnswer = this.currentAnswers[this.currentQuestionIndex];

                const content = `
                    <button class="btn-secondary mb-4" onclick="Quiz.backToCourse()">← Voltar para o Curso</button>

                <div class="quiz-container">
                    <div class="quiz-header">
                        <h2>Quiz - Questão ${this.currentQuestionIndex + 1} de ${this.questions.length}</h2>
                        <div class="quiz-progress">
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${((this.currentQuestionIndex + 1) / this.questions.length) * 100}%"></div>
                            </div>
                        </div>
                    </div>

                    <div class="question-card">
                        <div class="question-number">Questão ${this.currentQuestionIndex + 1}</div>
                        <div class="question-text">${question.text}</div>

                        <div class="options-grid">
                            ${question.options.map((option, idx) => `
                                    <div class="option-card ${currentAnswer === idx ? 'selected' : ''}" onclick="Quiz.selectAnswer(${idx})">
                                        ${option}
                                    </div>
                                `).join('')}
                        </div>

                        <div class="quiz-navigation">
                            <button class="btn-secondary" onclick="Quiz.previousQuestion()" ${this.currentQuestionIndex === 0 ? 'disabled' : ''}>Anterior</button>
                            <button class="btn-primary" onclick="Quiz.nextQuestion()">${this.currentQuestionIndex === this.questions.length - 1 ? 'Finalizar' : 'Próxima'}</button>
                        </div>
                    </div>
                </div>
        `;

                document.getElementById('content-area').innerHTML = content;
            },

            selectAnswer: function (answerIndex) {
                this.currentAnswers[this.currentQuestionIndex] = answerIndex;
                this.showQuestion();
            },

            previousQuestion: function () {
                if (this.currentQuestionIndex > 0) {
                    this.currentQuestionIndex--;
                    this.showQuestion();
                }
            },

            nextQuestion: function () {
                if (this.currentAnswers[this.currentQuestionIndex] === null) {
                    Toast.show('Por favor, selecione uma resposta', 'error');
                    return;
                }

                if (this.currentQuestionIndex === this.questions.length - 1) {
                    this.showResults();
                } else {
                    this.currentQuestionIndex++;
                    this.showQuestion();
                }
            },

            showResults: function () {
                let correctCount = 0;
                this.questions.forEach((question, idx) => {
                    if (this.currentAnswers[idx] === question.correct) {
                        correctCount++;
                    }
                });

                const percentage = (correctCount / this.questions.length) * 100;
                const passed = percentage >= 70;

                const content = `
                    <button class="btn-secondary mb-4" onclick="Quiz.backToCourse()">← Voltar para o Curso</button>

                <div class="quiz-container">
                    <div class="result-card">
                        <h2>Resultado do Quiz</h2>
                        <div class="result-score">${percentage}%</div>
                        <div class="result-message">
                            ${passed ? 'Aprovado com sucesso.' : 'Pontuação insuficiente. Revise o material e tente novamente.'}
                        </div>
                        <div class="result-details">
                            <p>Acertos: ${correctCount} de ${this.questions.length}</p>
                        </div>
                        ${passed ? `
                                <button class="btn-success" onclick="Quiz.completeQuiz()">Concluir e Marcar como Completo</button>
                            ` : `
                                <button class="btn-primary" onclick="Quiz.retry()">Tentar Novamente</button>
                            `}
                    </div>
                </div>
        `;

                document.getElementById('content-area').innerHTML = content;
            },

            completeQuiz: function () {
                Auth.updateUserProgress(this.courseId, this.lessonId, true);
                Toast.show('Quiz concluído com sucesso!', 'success');
                CourseDetail.render(this.courseId);
            },

            retry: function () {
                const courses = Storage.get('courses');
                let lesson = null;

                for (const c of courses) {
                    for (const module of c.modules) {
                        const found = module.lessons.find(l => l.id === this.lessonId);
                        if (found) {
                            lesson = found;
                            break;
                        }
                    }
                    if (lesson) break;
                }

                if (lesson) {
                    this.render(this.courseId, this.lessonId, lesson);
                }
            },

            backToCourse: function () {
                CourseDetail.render(this.courseId);
            }
        };

        // === MÓDULO DE MEUS CURSOS ===
        const MyCourses = {
            render: function () {

                const courses = Storage.get('courses');
                const enrolledCourses = courses.filter(course => currentUser?.enrolledCourses?.includes(course.id));

                const content = `

                <h2>Meus Cursos</h2>
                    </div >

            ${enrolledCourses.length === 0 ? `

                    ` : `
                        <div class="my-courses-grid">
                            ${enrolledCourses.map(course => `

                                        ${course.title.substring(0, 2).toUpperCase()}
                                    </div>
                                    <div class="course-info">
                                        <div class="course-title">${course.title}</div>
                                        <div class="course-description">${course.description.substring(0, 80)}...</div>
                                        <div class="course-meta">
                                                <span>${course.duration} horas</span>
                                                <span>Nível: ${course.level.toUpperCase()}</span>
                                        </div>
                                        <div class="course-progress">
                                            <div class="progress-bar">
                                                <div class="progress-fill" style="width: ${currentUser?.progress?.[course.id] || 0}%"></div>
                                            </div>
                                            <div class="progress-text">${currentUser?.progress?.[course.id] || 0}% concluído</div>
                                        </div>
                                        ${currentUser?.progress?.[course.id] === 100 ? `
                                            <button class="btn-success full-width mt-2" onclick="event.stopPropagation(); Certificate.render('${course.id}')">Ver Certificado</button>
                                        ` : ''}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    `}
        `;

                document.getElementById('content-area').innerHTML = content;
            }
        };

        // === MÓDULO DE CERTIFICADO ===
        const Certificate = {
            render: function (courseId) {
                const courses = Storage.get('courses');
                const course = courses.find(c => c.id === courseId);
                const currentUser = Auth.currentUser;

                if (!course || !currentUser || currentUser.progress?.[courseId] !== 100) {
                    Toast.show('Você precisa concluir 100% do curso para obter o certificado', 'error');
                    Router.navigate('my-courses');
                    return;
                }

                const completionDate = new Date().toLocaleDateString('pt-BR');

                const content = `
            < button class="btn-secondary mb-4 no-print" onclick = "Router.navigate('my-courses')" > Voltar</button >
                    <button class="btn-primary mb-4 no-print" onclick="window.print()">Exportar PDF / Imprimir</button>
                    
                    <div class="certificate-container" id="certificate">
                        <div class="certificate-header">
