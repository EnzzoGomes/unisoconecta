                            <div class="certificate-title">CERTIFICADO DE CONCLUSÃO</div>
                        </div>
                        <div class="certificate-content">
                            <p style="text-align: center;">Certificamos que</p>
                            <h2 style="text-align: center; margin: 20px 0; text-transform: uppercase;">${currentUser.name}</h2>
                            <p style="text-align: center;">concluiu com aproveitamento o curso</p>
                            <h3 style="text-align: center; margin: 20px 0;">${course.title}</h3>
                            <p style="text-align: center;">com carga horária de ${course.duration} horas, no dia ${completionDate}.</p>
                        </div>
                        <div class="certificate-signature">
                            <div class="signature-line"></div>
                            <p>COORDENAÇÃO ACADÊMICA</p>
                        </div>
                    </div>
        `;

                document.getElementById('content-area').innerHTML = content;
            }
        };

        // === MÓDULO DE PERFIL DO ALUNO ===
        const StudentProfile = {
            render: function () {
                const currentUser = Auth.currentUser;

                const content = `
            < div class="card" style = "background: linear-gradient(to right, var(--roxo-escuro), var(--roxo-medio)); color: white; display: flex; align-items: center; gap: 30px; padding: 40px;" >
                        <div style="width: 100px; height: 100px; background: white; color: var(--roxo-escuro); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: bold;">
                            ${currentUser.name.charAt(0)}
                        </div>
                        <div>
                            <h2 style="font-size: 28px;">${currentUser.name}</h2>
                            <p style="opacity: 0.8">Aluno UNISO Digital • Nível ${Math.floor((currentUser.xp || 0) / 500) + 1}</p>
                            <div class="flex gap-4 mt-4">
                                <div class="xp-badge">ESTRUTURA: 5 DIAS</div>
                                <div class="xp-badge">PONTUAÇÃO: ${currentUser.xp || 0} XP</div>
                            </div>
                        </div>
                    </div >

                    <div class="form-section">
                        <h3>Meu Perfil</h3>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Nome Completo</label>
                                <input type="text" id="profile-name" value="${currentUser.name}">
                            </div>
                            <div class="form-group">
                                <label>Email</label>
                                <input type="email" id="profile-email" value="${currentUser.email}" readonly>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Telefone</label>
                                <input type="tel" id="profile-phone" value="${currentUser.phone || ''}">
                            </div>
                            <div class="form-group">
                                <label>Data de Nascimento</label>
                                <input type="date" id="profile-birthdate" value="${currentUser.birthDate || ''}">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Nova Senha (deixe em branco para manter a atual)</label>
                            <input type="password" id="profile-password" placeholder="Nova senha">
                        </div>
                        <div class="form-actions">
                            <button class="btn-primary" onclick="StudentProfile.save()">Salvar Alterações</button>
                        </div>
                    </div>
                    
                    <div class="form-section">
                        <h3>Estatísticas de Aprendizado</h3>
                        <div class="dashboard-grid">
                            <div class="stat-card">
                                <div class="stat-number">${currentUser.enrolledCourses?.length || 0}</div>
                                <div class="stat-label">Cursos Matriculados</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-number">${currentUser.completedLessons?.length || 0}</div>
                                <div class="stat-label">Aulas Concluídas</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-number">${Object.values(currentUser.progress || {}).filter(p => p === 100).length}</div>
                                <div class="stat-label">Cursos Concluídos</div>
                            </div>
                        </div>
                    </div>
        `;

                document.getElementById('content-area').innerHTML = content;
            },

            save: function () {
                const name = document.getElementById('profile-name').value;
                const phone = document.getElementById('profile-phone').value;
                const birthDate = document.getElementById('profile-birthdate').value;
                const newPassword = document.getElementById('profile-password').value;

                if (!name) {
                    Toast.show('Nome é obrigatório', 'error');
                    return;
                }

                const users = Storage.get('users');
                const userIndex = users.findIndex(u => u.id === Auth.currentUser.id);

                if (userIndex !== -1) {
                    users[userIndex].name = name;
                    users[userIndex].phone = phone;
                    users[userIndex].birthDate = birthDate;

                    if (newPassword) {
                        users[userIndex].password = newPassword;
                    }

                    Storage.set('users', users);
                    Auth.currentUser = users[userIndex];
                    Storage.set('currentUser', Auth.currentUser);
                    Auth.updateUI();

                    Toast.show('Perfil atualizado com sucesso!', 'success');
                }
            }
        };

        // === MÓDULO DE GERENCIAMENTO DE CONTEÚDO ADMIN ===
        const ContentManager = {
            render: function () {
                const courses = Storage.get('courses');
                const content = `
            < div class="flex justify-between items-center mb-6" >
                <div>
                    <h2>Gerenciamento de Conteúdo</h2>
                    <p style="color: var(--cinza-medio);">Adicione e gerencie vídeos, aulas e materiais dos cursos.</p>
                </div>
                    </div >
            <div class="dashboard-grid">
                ${courses.map(course => {
                    let lessonCount = 0;
                    course.modules.forEach(m => lessonCount += m.lessons.length);
                    return `
                            <div class="card" style="cursor:pointer; border-left: 4px solid var(--roxo-claro);" onclick="ContentManager.manageCourse('${course.id}')">
                                <div style="display:flex; justify-content:space-between; align-items:center;">
                                    <div>
                                        <h3 style="margin-bottom:6px;">${course.title}</h3>
                                        <p style="color:var(--cinza-medio); font-size: var(--text-sm);">${course.modules.length} módulos • ${lessonCount} aulas</p>
                                    </div>
                                    <div style="font-size:14px; color:var(--roxo-claro); font-weight:600;">ABRIR</div>
                                </div>
                                <div class="progress-bar mt-3"><div class="progress-fill" style="width: ${lessonCount > 0 ? 100 : 0}%"></div></div>
                            </div>
                        `}).join('')}
            </div>
                    ${courses.length === 0 ? '<div class="card text-center" style="padding:40px;"><p style="color:var(--cinza-medio);">Nenhum curso cadastrado. Crie um curso primeiro em "Gerenciar Cursos".</p></div>' : ''}
        `;
                document.getElementById('content-area').innerHTML = content;
            },

            manageCourse: function (courseId) {
                const courses = Storage.get('courses');
                const course = courses.find(c => c.id === courseId);
                if (!course) return;

                const content = `
            < div class="flex justify-between items-center mb-6" >
                        <button class="btn-secondary" onclick="ContentManager.render()">← Voltar</button>
                        <h2>${course.title}</h2>
                        <button class="btn-primary" onclick="ContentManager.addModule('${courseId}')">+ Novo Módulo</button>
                    </div >
            <p style="color:var(--cinza-medio); margin-bottom:24px;">${course.description}</p>

                    ${course.modules.length === 0 ? '<div class="card text-center" style="padding:40px;"><p style="color:var(--cinza-medio);">Nenhum módulo ainda. Comece adicionando módulos e aulas.</p></div>' : ''}

                    ${course.modules.map((module, mIdx) => `
                        <div class="card" style="border-left: 4px solid var(--roxo-claro); margin-bottom:16px;">
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
                                <div>
                                    <h3 style="margin-bottom:4px;">${module.title}</h3>
                                    <span style="color:var(--cinza-medio); font-size:var(--text-sm);">${module.lessons.length} aula(s)</span>
                                </div>
                                <div style="display:flex; gap:8px;">
                                    <button class="action-btn view-btn" onclick="ContentManager.addLesson('${courseId}','${module.id}')">+ Aula</button>
                                    <button class="action-btn edit-btn" onclick="ContentManager.editModule('${courseId}','${module.id}')" title="Editar">Editar</button>
                                    <button class="action-btn delete-btn" onclick="ContentManager.deleteModule('${courseId}','${module.id}')" title="Excluir">Excluir</button>
                                </div>
                            </div>
                            ${module.lessons.length === 0 ? '<p style="color:var(--cinza-medio); font-size:var(--text-sm); text-align:center; padding:12px;">Módulo vazio. Adicione aulas.</p>' : `
                            <div style="display:flex; flex-direction:column; gap:8px;">
                                ${module.lessons.map((lesson, lIdx) => `
                                    <div style="display:flex; align-items:center; justify-content:space-between; padding:12px 16px; background:var(--roxo-muito-claro); border-radius:10px; transition: all 0.2s;">
                                        <div style="display:flex; align-items:center; gap:12px;">
                                            <span style="font-size:12px; background:var(--roxo-medio); color:white; padding:2px 8px; border-radius:4px; font-weight:600;">${lesson.type === 'video' ? 'VÍDEO' : lesson.type === 'quiz' ? 'QUIZ' : 'DOC'}</span>
                                            <div>
                                                <div style="font-weight:500;">${lesson.title}</div>
                                                <div style="font-size:var(--text-xs); color:var(--cinza-medio);">${lesson.duration} min • ${lesson.type.toUpperCase()}${lesson.videoId ? ' • YouTube: ' + lesson.videoId : ''}</div>
                                            </div>
                                        </div>
                                        <div style="display:flex; gap:6px;">
                                            ${lesson.videoId ? '<button class="action-btn view-btn" style="font-size:11px;" onclick="ContentManager.previewVideo(\'' + lesson.videoId + '\')">' + 'Ver Prévia</button>' : ''}
                                            <button class="action-btn edit-btn" style="font-size:11px;" onclick="ContentManager.editLesson('${courseId}','${module.id}','${lesson.id}')">Editar</button>
                                            <button class="action-btn delete-btn" style="font-size:11px;" onclick="ContentManager.deleteLesson('${courseId}','${module.id}','${lesson.id}')">Excluir</button>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>`}
                        </div>
                    `).join('')
                    }
        `;
                document.getElementById('content-area').innerHTML = content;
            },

            addModule: function (courseId) {
                const title = prompt('Nome do novo módulo:');
                if (title && title.trim()) {
                    const courses = Storage.get('courses');
                    const idx = courses.findIndex(c => c.id === courseId);
                    courses[idx].modules.push({ id: 'mod_' + Date.now(), title: title.trim(), lessons: [] });
                    Storage.set('courses', courses);
                    this.manageCourse(courseId);
                    Toast.show('Módulo criado!', 'success');
                }
            },

            editModule: function (courseId, moduleId) {
                const courses = Storage.get('courses');
                const course = courses.find(c => c.id === courseId);
                const module = course.modules.find(m => m.id === moduleId);
                const newTitle = prompt('Novo nome do módulo:', module.title);
                if (newTitle && newTitle.trim()) {
                    module.title = newTitle.trim();
                    Storage.set('courses', courses);
                    this.manageCourse(courseId);
                    Toast.show('Módulo atualizado!', 'success');
                }
            },

            deleteModule: function (courseId, moduleId) {
                if (confirm('Excluir este módulo e todas as suas aulas?')) {
                    const courses = Storage.get('courses');
                    const course = courses.find(c => c.id === courseId);
                    course.modules = course.modules.filter(m => m.id !== moduleId);
                    Storage.set('courses', courses);
                    this.manageCourse(courseId);
                    Toast.show('Módulo excluído!', 'success');
                }
            },

            addLesson: function (courseId, moduleId) {
                const modalId = 'content-lesson-modal';
                const existing = document.getElementById(modalId);
                if (existing) existing.remove();
                const html = `
            < div class="modal show" id = "${modalId}" >
                <div class="modal-content">
                    <div class="modal-header">
                        <h3 class="modal-title">Adicionar Conteúdo</h3>
                        <button class="close-modal" onclick="document.getElementById('${modalId}').remove()">&times;</button>
                    </div>
                    <div class="modal-body">
                        <div class="form-group">
                            <label>Título da Aula</label>
                            <input type="text" id="cm-title" placeholder="Ex: Introdução ao tema">
                        </div>
                        <div class="form-group">
                            <label>Tipo de Conteúdo</label>
                            <select id="cm-type" onchange="ContentManager.toggleVideoField()">
                                <option value="video">Video Aula</option>
                                <option value="quiz">Quiz / Avaliação</option>
                                <option value="material">Material de Apoio</option>
                            </select>
                        </div>
                        <div class="form-group" id="cm-video-group">
                            <label>URL ou ID do YouTube</label>
                            <input type="text" id="cm-video" placeholder="Cole a URL ou ID do vídeo" oninput="ContentManager.showVideoPreview()">
                                <div id="cm-video-preview" style="margin-top:10px;"></div>
                        </div>
                        <div class="form-group">
                            <label>Descrição (opcional)</label>
                            <textarea id="cm-desc" rows="3" placeholder="Descreva o conteúdo desta aula..."></textarea>
                        </div>
                        <div class="form-group">
                            <label>Duração (minutos)</label>
                            <input type="number" id="cm-dur" value="15" min="1">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button class="btn-secondary" onclick="document.getElementById('${modalId}').remove()">Cancelar</button>
                        <button class="btn-primary" onclick="ContentManager.saveLesson('${courseId}','${moduleId}')">Salvar Conteúdo</button>
                    </div>
                </div>
                    </div >
            `;
                document.body.insertAdjacentHTML('beforeend', html);
            },

            toggleVideoField: function () {
                const type = document.getElementById('cm-type')?.value;
                const vg = document.getElementById('cm-video-group');
                if (vg) vg.style.display = type === 'video' ? 'block' : 'none';
            },

            showVideoPreview: function () {
                const input = document.getElementById('cm-video')?.value || '';
                const preview = document.getElementById('cm-video-preview');
                if (!preview) return;
                let videoId = input.trim();
                if (videoId.includes('youtube.com/watch')) {
                    try { videoId = new URL(videoId).searchParams.get('v'); } catch (e) { }
                } else if (videoId.includes('youtu.be/')) {
                    videoId = videoId.split('youtu.be/')[1]?.split('?')[0];
                }
                if (videoId && videoId.length > 5) {
                    preview.innerHTML = `< div style = "border-radius:8px; overflow:hidden;" > <iframe width="100%" height="200" src="https://www.youtube.com/embed/${videoId}" frameborder="0" allowfullscreen></iframe></div > `;
                } else {
                    preview.innerHTML = '';
                }
            },

            extractVideoId: function (input) {
                let videoId = input.trim();
                if (videoId.includes('youtube.com/watch')) {
                    try { videoId = new URL(videoId).searchParams.get('v'); } catch (e) { }
                } else if (videoId.includes('youtu.be/')) {
                    videoId = videoId.split('youtu.be/')[1]?.split('?')[0];
                }
                return videoId;
            },

            saveLesson: function (courseId, moduleId) {
                const title = document.getElementById('cm-title')?.value;
                const type = document.getElementById('cm-type')?.value;
                const videoRaw = document.getElementById('cm-video')?.value || '';
                const desc = document.getElementById('cm-desc')?.value || '';
                const dur = document.getElementById('cm-dur')?.value;
                if (!title || !dur) { Toast.show('Preencha título e duração', 'error'); return; }
                const videoId = type === 'video' ? this.extractVideoId(videoRaw) : null;
                const courses = Storage.get('courses');
                const course = courses.find(c => c.id === courseId);
                const module = course.modules.find(m => m.id === moduleId);
                module.lessons.push({
                    id: 'aula_' + Date.now(),
                    title, type, videoId,
                    description: desc,
                    duration: parseInt(dur),
                    completed: false
                });
                Storage.set('courses', courses);
                document.getElementById('content-lesson-modal')?.remove();
                this.manageCourse(courseId);
                Toast.show('Conteúdo adicionado!', 'success');
            },

            editLesson: function (courseId, moduleId, lessonId) {
                const courses = Storage.get('courses');
                const course = courses.find(c => c.id === courseId);
                const module = course.modules.find(m => m.id === moduleId);
                const lesson = module.lessons.find(l => l.id === lessonId);
                if (!lesson) return;
                const modalId = 'content-edit-modal';
                const existing = document.getElementById(modalId);
                if (existing) existing.remove();
                const html = `
            < div class="modal show" id = "${modalId}" >
                <div class="modal-content">
                    <div class="modal-header">
                        <h3 class="modal-title">Editar Conteúdo</h3>
                        <button class="close-modal" onclick="document.getElementById('${modalId}').remove()">&times;</button>
                    </div>
                    <div class="modal-body">
                        <div class="form-group">
                            <label>Título</label>
                            <input type="text" id="ce-title" value="${lesson.title}">
                        </div>
                        <div class="form-group">
                            <label>Tipo</label>
                            <select id="ce-type">
                                <option value="video" ${lesson.type === 'video' ? 'selected' : ''}>Video</option>
                                <option value="quiz" ${lesson.type === 'quiz' ? 'selected' : ''}>Quiz</option>
                                <option value="material" ${lesson.type === 'material' ? 'selected' : ''}>Material</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>YouTube URL/ID</label>
                            <input type="text" id="ce-video" value="${lesson.videoId || ''}">
                        </div>
                        <div class="form-group">
                            <label>Duração (min)</label>
                            <input type="number" id="ce-dur" value="${lesson.duration}" min="1">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button class="btn-secondary" onclick="document.getElementById('${modalId}').remove()">Cancelar</button>
                        <button class="btn-primary" onclick="ContentManager.updateLesson('${courseId}','${moduleId}','${lessonId}')">Salvar</button>
                    </div>
                </div>
                    </div >
            `;
                document.body.insertAdjacentHTML('beforeend', html);
            },

            updateLesson: function (courseId, moduleId, lessonId) {
                const title = document.getElementById('ce-title')?.value;
                const type = document.getElementById('ce-type')?.value;
                const videoRaw = document.getElementById('ce-video')?.value || '';
                const dur = document.getElementById('ce-dur')?.value;
                if (!title) { Toast.show('Título obrigatório', 'error'); return; }
                const courses = Storage.get('courses');
                const course = courses.find(c => c.id === courseId);
                const module = course.modules.find(m => m.id === moduleId);
                const lesson = module.lessons.find(l => l.id === lessonId);
                lesson.title = title;
                lesson.type = type;
                lesson.videoId = type === 'video' ? this.extractVideoId(videoRaw) : null;
                lesson.duration = parseInt(dur) || lesson.duration;
                Storage.set('courses', courses);
                document.getElementById('content-edit-modal')?.remove();
                this.manageCourse(courseId);
                Toast.show('Conteúdo atualizado!', 'success');
            },

            deleteLesson: function (courseId, moduleId, lessonId) {
                if (confirm('Excluir este conteúdo?')) {
                    const courses = Storage.get('courses');
                    const course = courses.find(c => c.id === courseId);
                    const module = course.modules.find(m => m.id === moduleId);
                    module.lessons = module.lessons.filter(l => l.id !== lessonId);
                    Storage.set('courses', courses);
                    this.manageCourse(courseId);
                    Toast.show('Conteúdo excluído!', 'success');
                }
            },

            previewVideo: function (videoId) {
                const modalId = 'video-preview-modal';
                const existing = document.getElementById(modalId);
                if (existing) existing.remove();
                const html = `
            < div class="modal show" id = "${modalId}" onclick = "if(event.target===this)document.getElementById('${modalId}').remove()" >
                <div class="modal-content" style="max-width:720px;">
                    <div class="modal-header">
                        <h3 class="modal-title">Preview do Vídeo</h3>
                        <button class="close-modal" onclick="document.getElementById('${modalId}').remove()">&times;</button>
                    </div>
                    <div style="padding:0;"><iframe width="100%" height="400" src="https://www.youtube.com/embed/${videoId}" frameborder="0" allowfullscreen style="display:block;"></iframe></div>
                </div>
                    </div >
            `;
                document.body.insertAdjacentHTML('beforeend', html);
            }
        };

        // === MÓDULO PRINCIPAL ===
        const MainApp = {
            showLoginPage: function () {
                document.getElementById('login-page').style.display = 'flex';
                document.getElementById('main-app').style.display = 'none';
            },

            showMainApp: function () {
                document.getElementById('login-page').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';

                this.buildMenu();

                // Default route based on role
                if (Auth.currentUser?.role === 'admin') {
                    Router.navigate('admin-dashboard');
                } else {
                    Router.navigate('catalog');
                }
            },

            buildMenu: function () {
                const menuContainer = document.getElementById('top-menu');
                const user = Auth.currentUser;
                let menuItems = [];

                if (user?.role === 'admin') {
                    menuItems = [
                        { text: 'Dashboard', route: 'admin-dashboard' },
                        { text: 'Cursos', route: 'admin-courses' },
                        { text: 'Conteúdo', route: 'admin-content' },
                        { text: 'Alunos', route: 'admin-students' },
                        { text: 'Meu Perfil', route: 'profile' }
                    ];
                } else {
                    menuItems = [
                        { text: 'Catálogo', route: 'catalog' },
                        { text: 'Meus Cursos', route: 'my-courses' },
                        { text: 'Meu Perfil', route: 'profile' }
                    ];
                }

                menuContainer.innerHTML = menuItems.map(item => `
                    <div class="nav-link" data-route="${item.route}" onclick="Router.navigate('${item.route}')">
                        ${item.text}
                    </div>
                `).join('');
            }
        };

        // === CONFIGURAÇÃO DE ROTAS ===
        Router.addRoute('admin-dashboard', () => AdminDashboard.render());
        Router.addRoute('admin-courses', () => CourseManager.renderList());
        Router.addRoute('admin-content', () => ContentManager.render());
        Router.addRoute('admin-students', () => StudentManager.renderList());
        Router.addRoute('catalog', () => CourseCatalog.render());
        Router.addRoute('my-courses', () => MyCourses.render());
        Router.addRoute('profile', () => StudentProfile.render());

        // === EVENT LISTENERS ===
        document.addEventListener('DOMContentLoaded', () => {
            Auth.init();



            // Login form
            document.getElementById('login-form').addEventListener('submit', (e) => {
                e.preventDefault();
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                Auth.login(email, password);
            });

            // Register modal
            document.getElementById('show-register').addEventListener('click', () => {
                Modal.show('register-modal');
            });

            document.getElementById('submit-register').addEventListener('click', () => {
                const name = document.getElementById('reg-name').value;
                const email = document.getElementById('reg-email').value;
                const password = document.getElementById('reg-password').value;
                const confirmPassword = document.getElementById('reg-confirm-password').value;
                const phone = document.getElementById('reg-phone').value;
                const birthDate = document.getElementById('reg-birthdate').value;

                if (!name || !email || !password) {
                    Toast.show('Preencha os campos obrigatórios', 'error');
                    return;
                }

                if (password !== confirmPassword) {
                    Toast.show('As senhas não coincidem', 'error');
                    return;
                }

                Auth.register({ name, email, password, phone, birthDate });
            });

            // Forgot password modal
            document.getElementById('show-forgot-password').addEventListener('click', () => {
                Modal.show('forgot-password-modal');
            });

            document.getElementById('send-reset-link').addEventListener('click', () => {
                const email = document.getElementById('forgot-email').value;
                if (email) {
                    Toast.show('Link de recuperação enviado para o email!', 'success');
                    Modal.hide('forgot-password-modal');
                } else {
                    Toast.show('Informe um email válido', 'error');
                }
            });

            // Close modals
            document.querySelectorAll('.close-modal').forEach(btn => {
                btn.addEventListener('click', function () {
                    const modal = this.closest('.modal');
                    if (modal) modal.classList.remove('show');
                });
            });

            // Logout
            document.getElementById('logout-btn').addEventListener('click', () => {
                Auth.logout();
            });
        });

        // Make functions globally available
        window.AdminDashboard = AdminDashboard;
        window.CourseManager = CourseManager;
        window.ContentManager = ContentManager;
        window.StudentManager = StudentManager;
        window.CourseCatalog = CourseCatalog;
        window.CourseDetail = CourseDetail;
        window.Quiz = Quiz;
        window.LessonPlayer = LessonPlayer;
        window.MyCourses = MyCourses;
        window.Certificate = Certificate;
        window.StudentProfile = StudentProfile;
        window.Router = Router;
        window.Modal = Modal;
        window.Toast = Toast;
        window.Auth = Auth;
    </script>
</body>

</html>
